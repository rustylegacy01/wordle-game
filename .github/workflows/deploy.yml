name: Deploy to VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --production
      
    - name: Create deployment archive
      run: |
        tar -czf deploy.tar.gz --exclude='.git' --exclude='node_modules' --exclude='data/*.db' .
        
    - name: Deploy to VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "deploy.tar.gz"
        target: "${{ secrets.VPS_DEPLOY_PATH }}"
        
    - name: Execute deployment commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd ${{ secrets.VPS_DEPLOY_PATH }}
          
          # Backup database if exists
          if [ -f data/leaderboard.db ]; then
            cp data/leaderboard.db data/leaderboard.db.backup
          fi
          
          # Extract new files
          tar -xzf deploy.tar.gz
          rm deploy.tar.gz
          
          # Restore database
          if [ -f data/leaderboard.db.backup ]; then
            mv data/leaderboard.db.backup data/leaderboard.db
          fi
          
          # Install dependencies
          npm ci --production
          
          # Ensure data directory exists
          mkdir -p data
          
          # Restart PM2 process or start new one
          if pm2 list | grep -q "wordle-game"; then
            pm2 restart wordle-game
          else
            pm2 start server.js --name wordle-game
            pm2 save
          fi
          
          # Cleanup old PM2 logs
          pm2 flush wordle-game 2>/dev/null || true
          
          echo "Deployment completed successfully!"
          
    - name: Health check
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          sleep 3
          curl -f http://localhost:3000/api/health || exit 1
          echo "Health check passed!"